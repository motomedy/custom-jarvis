<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS Portal</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #181c24; color: #f3f6fa; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    h1 { color: #00eaff; margin-bottom: 0.5em; }
    form { display: flex; gap: 0.5em; margin-bottom: 1em; }
    input, button { font-size: 1.1em; padding: 0.5em; border-radius: 4px; border: none; }
    input { width: 18em; }
    button { background: #00eaff; color: #181c24; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #00b3c6; }
    #r { background: #23293a; color: #fff; padding: 1em; border-radius: 6px; min-width: 20em; min-height: 4em; white-space: pre-wrap; }
    @media (max-width: 600px) { input { width: 10em; } #r { min-width: 10em; } }
  </style>
</head>
<body>
  <h1>JARVIS Portal</h1>
  <form id="f">
    <input name="q" placeholder="Ask Jarvis..." autocomplete="off" required>
    <button type="submit">Ask</button>
    <button type="button" id="mic" title="Speak" style="background:#23293a;color:#00eaff;">🎤</button>
  </form>
  <pre id="r">Hello! How can I help you today?</pre>
  <div id="status-bubble" style="position:fixed;right:1.5em;bottom:1.5em;z-index:1000;background:#23293a;color:#fff;padding:0.7em 1.2em;border-radius:2em;box-shadow:0 2px 8px #0008;font-size:1em;display:flex;align-items:center;gap:0.5em;user-select:none;transition:background 0.2s;"><span id="status-dot" style="display:inline-block;width:0.8em;height:0.8em;border-radius:50%;background:#ffb300;"></span><span id="status-text">Checking...</span></div>
  <script>
    const f = document.getElementById('f');
    // --- Status Bubble ---
    const statusBubble = document.getElementById('status-bubble');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    async function checkBackend() {
      try {
        const res = await fetch('/api/health', {cache:'no-store'});
        if (res.ok) {
          statusDot.style.background = '#00eaff';
          statusBubble.style.background = '#1a2b2f';
          statusText.textContent = 'Backend: Online';
        } else {
          statusDot.style.background = '#ff4d4d';
          statusBubble.style.background = '#3a2323';
          statusText.textContent = 'Backend: Offline';
        }
      } catch {
        statusDot.style.background = '#ff4d4d';
        statusBubble.style.background = '#3a2323';
        statusText.textContent = 'Backend: Offline';
      }
    }
    setInterval(checkBackend, 5000);
    checkBackend();
    const r = document.getElementById('r');
    const micBtn = document.getElementById('mic');
    let recognizing = false;
    let recognition;
    const micHelp = document.createElement('div');
    micHelp.style.margin = '0.5em 0 1em 0';
    micHelp.style.color = '#ffb300';
    document.body.insertBefore(micHelp, r);
    function showMicHelp(msg) {
      micHelp.textContent = msg;
    }
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.onstart = () => { recognizing = true; micBtn.textContent = '🛑'; showMicHelp('Listening... Click 🛑 to stop.'); };
      recognition.onend = () => { recognizing = false; micBtn.textContent = '🎤'; showMicHelp(''); };
      recognition.onerror = e => {
        recognizing = false; micBtn.textContent = '🎤';
        let msg = 'Microphone error: ' + e.error;
        if (e.error === 'not-allowed') msg += ' — Please allow microphone access in your browser.';
        if (e.error === 'no-speech') msg += ' — No speech detected. Try again.';
        if (e.error === 'aborted') msg += ' — Mic stopped unexpectedly.';
        showMicHelp(msg);
      };
      recognition.onresult = e => {
        const transcript = e.results[0][0].transcript;
        f.q.value = transcript;
        f.dispatchEvent(new Event('submit'));
      };
      micBtn.onclick = () => {
        if (recognizing) { recognition.stop(); } else {
          showMicHelp('If prompted, please allow microphone access.');
          recognition.start();
        }
      };
    } else {
      micBtn.disabled = true;
      micBtn.title = 'Speech recognition not supported';
      showMicHelp('Speech recognition is not supported in this browser. Try Chrome or Edge on desktop.');
    }
    function speak(text) {
      if ('speechSynthesis' in window) {
        try {
          const utter = new SpeechSynthesisUtterance(text);
          utter.lang = 'en-US';
          const voices = window.speechSynthesis.getVoices();
          const samantha = voices.find(v => v.name === 'Samantha');
          if (samantha) utter.voice = samantha;
          utter.onerror = (e) => {
            r.textContent += '\n[Voice error: ' + e.error + ']';
            console.error('TTS error', e);
          };
          window.speechSynthesis.speak(utter);
        } catch (e) {
          r.textContent += '\n[Voice error: ' + e + ']';
          console.error('TTS error', e);
        }
      }
    }
    // On some browsers, voices may not be loaded immediately
    if ('speechSynthesis' in window && typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
      window.speechSynthesis.onvoiceschanged = () => {};
    }
    f.onsubmit = async e => {
      e.preventDefault();
      r.textContent = 'Thinking...';
      const q = f.q.value;
      let timeoutId, frozenId;
      try {
        timeoutId = setTimeout(() => { r.textContent = 'Still thinking... (slow network or backend)'; }, 1000);
        frozenId = setTimeout(() => { r.textContent = 'Request timed out. Please try again.'; }, 15000);
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: q })
        });
        clearTimeout(timeoutId);
        clearTimeout(frozenId);
        if (!res.ok) {
          r.textContent = 'Server error: ' + res.status;
          console.error('API error', res);
          return;
        }
        const data = await res.json();
        console.log('API response:', data);
        if (data.output) {
          r.textContent = data.output;
          speak(data.output);
        } else if (data.error) {
          r.textContent = 'Error: ' + data.error;
        } else {
          r.textContent = 'No response from backend.';
        }
      } catch (err) {
        clearTimeout(timeoutId);
        clearTimeout(frozenId);
        r.textContent = 'Backend offline or unreachable. Please check if the server is running.';
        console.error('Network/API error', err);
      }
    };
  </script>
</body>
</html>
